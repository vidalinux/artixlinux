<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
"http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
    <policy context="default">
        <allow own="me.proton.vpn.split_tunneling"/>

        <allow send_destination="me.proton.vpn.split_tunneling"/>
        <allow receive_sender="me.proton.vpn.split_tunneling"/>
        <allow send_interface="org.freedesktop.DBus.Introspectable"/>
        <allow receive_interface="org.freedesktop.DBus.Introspectable"/>
    </policy>
</busconfig>
